version: '3.9'

services:
  sentiment-ai:
    image: sentiment-ai:${IMAGE_TAG:-latest}
    container_name: sentiment-staging-deploy
    ports:
      - "8001:8000"
    environment:
      - ENV=staging
    networks:
      - cicd-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  cicd-network:
    external: true
    name: tp2_cicd-network
