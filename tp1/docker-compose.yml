version: '3.9'

services:
  sentiment-ai:
    build: .
    container_name: sentiment-staging
    ports:
      - "8080:8000"
    environment:
      - ENV=development
    networks:
      - cicd-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  cicd-network:
    driver: bridge
